function b64ToBytes(b64) {
  const bin = atob(b64);
  const out = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
  return out;
}

const form = document.getElementById('f');
const inp = document.getElementById('p');
const btn = document.getElementById('btn');
const err = document.getElementById('err');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  err.textContent = '';
  btn.disabled = true;
  btn.textContent = 'Расшифровка...';
  try {
    const pwd = inp.value;
    const salt = b64ToBytes(SALT);
    const iv   = b64ToBytes(IV);
    const ct   = b64ToBytes(CT);
    const enc  = new TextEncoder();
    const baseKey = await crypto.subtle.importKey(
      'raw', enc.encode(pwd), 'PBKDF2', false, ['deriveKey']
    );
    const key = await crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
      baseKey,
      { name: 'AES-GCM', length: 256 },
      false, ['decrypt']
    );
    const ptBuf = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ct);
    const html = new TextDecoder().decode(ptBuf);
    const doc = new DOMParser().parseFromString(html, 'text/html');
    const head = doc.head;
    if (head && !head.querySelector('link[href*="fonts.googleapis.com"]')) {
      const l = doc.createElement('link');
      l.rel = 'stylesheet';
      l.href = 'https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap';
      head.appendChild(l);
    }
    document.open();
    document.write('<!DOCTYPE html>', doc.documentElement.outerHTML);
    document.close();
  } catch (ex) {
    err.textContent = 'Неверный пароль';
    btn.disabled = false;
    btn.textContent = 'Открыть';
    inp.select();
  }
});
</script>
